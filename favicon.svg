<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#1a1a2e" />
  <g stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" fill="none">
    <!-- Outer border -->
    <rect x="3" y="3" width="26" height="26" rx="1" />
    <!-- Entry gap top -->
    <line x1="14" y1="3" x2="18" y2="3" stroke="#1a1a2e" stroke-width="3.5" />
    <!-- Exit gap bottom -->
    <line x1="14" y1="29" x2="18" y2="29" stroke="#1a1a2e" stroke-width="3.5" />
    <!-- Internal walls - sparse -->
    <line x1="10" y1="3" x2="10" y2="12" />
    <line x1="3" y1="16" x2="12" y2="16" />
    <line x1="16" y1="10" x2="22" y2="10" />
    <line x1="22" y1="10" x2="22" y2="20" />
    <line x1="10" y1="22" x2="10" y2="29" />
    <line x1="16" y1="20" x2="16" y2="29" />
  </g>
</svg>
